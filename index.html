<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Concept2 Logbook 모바일 통합 분석 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased pb-12" onload="fetchConcept2Results()">

    <header class="sticky top-0 z-40 border-b border-slate-800 bg-slate-900/80 backdrop-blur px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div id="statusDot" class="w-2.5 h-2.5 rounded-full bg-red-500 animate-pulse"></div>
            <h1 class="text-base font-black tracking-wider uppercase text-slate-200">Concept2 Dashboard</h1>
        </div>
        <button onclick="toggleConfigModal(true)" type="button" class="bg-slate-800 text-slate-300 hover:text-[#00FF66] p-1.5 rounded-xl border border-slate-700 flex items-center justify-center cursor-pointer transition active:scale-95">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        </button>
    </header>

    <main class="p-4 space-y-5 max-w-md mx-auto">
        
        <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl space-y-3 shadow-xl">
            <div class="flex justify-between items-center">
                <span class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">Concept2 Logbook API</span>
                <span id="syncIndicator" class="text-[10px] text-red-400 font-bold">인증 정보 없음</span>
            </div>
            <button onclick="fetchConcept2Results()" class="w-full bg-[#00FF66] text-black font-black text-sm py-2.5 rounded-xl hover:bg-[#CCFF00] active:scale-[0.98] transition cursor-pointer">
                실시간 로그북 동기화
            </button>
        </div>

        <div id="statusMessage" class="hidden p-4 rounded-2xl text-xs font-semibold bg-slate-900 border border-slate-800 text-center"></div>

        <div id="workoutSelectContainer" class="hidden bg-slate-900 border border-slate-800 p-4 rounded-2xl space-y-2 shadow-xl overflow-hidden">
            <div class="flex justify-between items-center pb-1">
                <span class="text-[11px] font-bold text-slate-400 uppercase tracking-wider block">동기화 완료 세션</span>
                <span class="text-[9px] text-slate-500 font-mono">세션 클릭 시 고유 ID 매핑 Split 데이터 출력</span>
            </div>
            
            <div class="flex gap-2 pb-1">
                <button onclick="filterWorkouts('all')" class="flex-1 bg-slate-800 text-slate-300 text-[10px] font-bold py-1.5 rounded-lg hover:bg-[#00FF66] hover:text-black transition cursor-pointer border border-slate-700">전체</button>
                <button onclick="filterWorkouts('VariableInterval')" class="flex-1 bg-slate-800 text-slate-300 text-[10px] font-bold py-1.5 rounded-lg hover:bg-[#00FF66] hover:text-black transition cursor-pointer border border-slate-700">인터벌</button>
                <button onclick="filterWorkouts('FixedDistanceSplits')" class="flex-1 bg-slate-800 text-slate-300 text-[10px] font-bold py-1.5 rounded-lg hover:bg-[#00FF66] hover:text-black transition cursor-pointer border border-slate-700">단일</button>
            </div>
            
            <div class="w-full border border-slate-800 rounded-xl bg-slate-950 overflow-hidden text-[11px] font-mono">
                <div class="w-full bg-slate-900 px-3 py-2 border-b border-slate-800 flex flex-row items-center justify-between text-slate-400 font-bold tracking-tight text-center">
                    <div class="flex items-center gap-1.5 w-[30%] text-left">
                        <button onclick="handleSort('date')" class="hover:text-[#00FF66] flex items-center gap-0.5 cursor-pointer">일자<span id="sort_date">▼</span></button>
                        <button onclick="handleSort('distance')" class="hover:text-[#00FF66] flex items-center gap-0.5 cursor-pointer">거리<span id="sort_distance"></span></button>
                    </div>
                    <div class="w-[20%]">
                        <button onclick="handleSort('time')" class="hover:text-[#00FF66] flex items-center gap-0.5 mx-auto cursor-pointer">⏱️시간<span id="sort_time"></span></button>
                    </div>
                    <div class="w-[20%] text-c2-green">
                        <button onclick="handleSort('pace')" class="hover:text-[#00FF66] flex items-center gap-0.5 mx-auto cursor-pointer">⏱️페이스<span id="sort_pace"></span></button>
                    </div>
                    <div class="w-[16%]">
                        <button onclick="handleSort('stroke_count')" class="hover:text-[#00FF66] flex items-center gap-0.5 mx-auto cursor-pointer">🚣회수<span id="sort_stroke_count"></span></button>
                    </div>
                    <div class="w-[14%] text-right">
                        <button onclick="handleSort('stroke_rate')" class="hover:text-[#00FF66] flex items-center gap-0.5 ml-auto cursor-pointer">⚡SPM<span id="sort_stroke_rate"></span></button>
                    </div>
                </div>
                <div id="workoutListGroup" class="w-full h-[220px] overflow-y-auto divide-y divide-slate-900/60 no-scrollbar"></div>
            </div>
        </div>

        <div id="dashboardContainer" class="hidden space-y-5">
            <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl shadow-xl space-y-2">
                <div class="flex justify-between items-center mb-1 border-b border-slate-800 pb-2">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider block">Detailed Split 데이터</span>
                    <span id="activeDateLabel" class="text-xs text-[#00FF66] font-mono font-bold"></span>
                </div>
                
                <div class="w-full overflow-x-auto border border-slate-800 rounded-xl bg-slate-950 no-scrollbar">
                    <table class="w-full text-left border-collapse text-[11px] font-mono whitespace-nowrap min-w-[340px]">
                        <thead>
                            <tr class="bg-slate-900 text-slate-400 font-bold border-b border-slate-800">
                                <th class="py-1.5 px-2 text-right">시간</th>
                                <th class="py-1.5 px-2 text-right">거리</th>
                                <th class="py-1.5 px-2 text-right">페이스</th>
                                <th class="py-1.5 px-2 text-right">와트</th>
                                <th class="py-1.5 px-2 text-right">칼로리</th>
                                <th class="py-1.5 px-2 text-right text-orange-400">1회당 길이</th>
                                <th class="py-1.5 px-2 text-right text-sky-400 pr-3">s/m</th>
                            </tr>
                        </thead>
                        <tbody id="splitTableBody" class="divide-y divide-slate-900 text-slate-200">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl shadow-xl space-y-2">
                <div class="flex justify-between items-center mb-1 border-b border-slate-800 pb-2">
                    <span class="text-xs font-bold text-[#CCFF00] uppercase tracking-wider block">Raw Stroke 상세 분석</span>
                </div>
                <div class="w-full overflow-x-auto overflow-y-auto max-h-[320px] border border-slate-800 rounded-xl bg-slate-950 no-scrollbar relative">
                    <table class="w-full text-left border-collapse text-[11px] font-mono whitespace-nowrap min-w-[340px]">
                        <thead class="sticky top-0 bg-slate-900 shadow-[0_1px_0_0_#1e293b] z-10">
                            <tr class="text-slate-400 font-bold border-b border-slate-800">
                                <th class="py-1.5 px-2 text-right text-orange-400">페이스</th>
                                <th class="py-1.5 px-2 text-right text-orange-400">SPM</th>
                                <th class="py-1.5 px-2 text-right text-orange-400">출력</th>
                                <th class="py-1.5 px-2 text-right">누적거리</th>
                                <th class="py-1.5 px-2 text-right">누적시간</th>
                                <th class="py-1.5 px-2 text-right text-sky-400">1회거리</th>
                                <th class="py-1.5 px-2 text-right text-sky-400">1회시간</th>
                            </tr>
                        </thead>
                        <tbody id="strokeTableBody" class="divide-y divide-slate-900 text-slate-200"></tbody>
                    </table>
                </div>
                <div class="mt-4 bg-slate-950 border border-slate-800 rounded-xl p-2 w-full h-[220px]">
                    <canvas id="strokeScatterChart"></canvas>
                </div>
            </div>

            <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl shadow-xl space-y-3">
                <div class="flex justify-between items-center mb-1 border-b border-slate-800 pb-2">
                    <span class="text-xs font-bold text-[#00FF66] uppercase tracking-wider flex items-center gap-1">
                        ✨ Gemini AI 분석
                    </span>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="generateAiReport('today')" class="bg-slate-800 text-slate-300 text-[10px] font-bold py-2 rounded-lg hover:bg-slate-700 hover:text-white transition">당일 분석</button>
                    <button onclick="generateAiReport('recent_10')" class="bg-slate-800 text-slate-300 text-[10px] font-bold py-2 rounded-lg hover:bg-slate-700 hover:text-white transition">최근 10건 비교</button>
                    <button onclick="generateAiReport('top_3')" class="bg-slate-800 text-slate-300 text-[10px] font-bold py-2 rounded-lg hover:bg-slate-700 hover:text-white transition">Top 페이스 3건</button>
                </div>
                <div id="aiFeedbackBox" class="hidden mt-3 p-3 bg-slate-950 border border-slate-800 rounded-xl text-sm text-slate-300 leading-relaxed font-sans max-h-[300px] overflow-y-auto no-scrollbar"></div>
            </div>
        </div>
    </main>

    <div id="configModal" class="hidden fixed inset-0 z-50 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden">
            <div class="px-4 py-3 bg-slate-950 border-b border-slate-800 flex justify-between items-center">
                <span class="text-xs font-black tracking-wider uppercase text-slate-300">⚙️ API 연동 수동 설정</span>
                <button onclick="toggleConfigModal(false)" type="button" class="text-slate-500 hover:text-slate-200 text-lg font-bold p-1 cursor-pointer">&times;</button>
            </div>
            <div class="p-4 space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wide">Concept2 Access Token</label>
                    <input type="password" id="cfgToken" placeholder="Bearer 토큰 입력" class="w-full bg-slate-950 border border-slate-700 text-xs px-3 py-2 rounded-xl text-slate-200 focus:outline-none focus:border-[#00FF66]">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wide">User ID (고유 고객 번호)</label>
                    <input type="text" id="cfgUser" placeholder="예: 2708646" class="w-full bg-slate-950 border border-slate-700 text-xs px-3 py-2 rounded-xl text-slate-200 focus:outline-none focus:border-[#00FF66]">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wide">Gemini API Key (선택)</label>
                    <input type="password" id="cfgGemini" placeholder="AI 분석용 API 키" class="w-full bg-slate-950 border border-slate-700 text-xs px-3 py-2 rounded-xl text-slate-200 focus:outline-none focus:border-[#00FF66]">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wide">통신 모드 (CORS 우회)</label>
                    <select id="cfgProxyMode" class="w-full bg-slate-950 border border-slate-700 text-xs px-3 py-2 rounded-xl text-slate-200 focus:outline-none focus:border-[#00FF66]">
                        <option value="direct">직접 통신 (Apps Script 브릿지 전용)</option>
                        <option value="allorigins">오픈 프록시 (AllOrigins 경유)</option>
                    </select>
                </div>
                <div class="pt-2 flex gap-2">
                    <button onclick="toggleConfigModal(false)" type="button" class="flex-1 bg-slate-800 text-slate-400 font-bold text-xs py-2.5 rounded-xl cursor-pointer hover:bg-slate-700">취소</button>
                    <button onclick="saveConfiguration()" type="button" class="flex-1 bg-[#00FF66] text-black font-black text-xs py-2.5 rounded-xl cursor-pointer hover:bg-[#CCFF00]">정보 세이브</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
